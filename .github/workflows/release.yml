name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code 🛎️
        uses: actions/checkout@v4

      - name: Create GitHub Release 🚀
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
